    position: relative;
    display: inline-block;
    max-width: 100%;
    width: min(860px, 100%);
  }

  #chart-img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    pointer-events: none;
  }

  /* fw = field wrapper. left/top mark the CENTER of the box.
     rotation is applied via CSS rotate on the wrapper.
     The input fills the wrapper completely. */
  .fw {
    position: absolute;
    transform-origin: center center;
    /* translate(-50%,-50%) moves anchor from top-left to center,
       then rotate is applied. Combined in JS. */
  }

  .fw input {
    display: block;
    width: 100%;
    height: 100%;
    border: 1.5px solid rgba(60,60,60,0.5);
    border-radius: 2px;
    background: rgba(255,255,255,0.85);
    color: #111;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: clamp(5px, 1.0vw, 11px);
    text-align: center;
    padding: 0 1px;
    outline: none;
    transition: background 0.15s, border-color 0.15s;
    caret-color: #333;
    cursor: text;
  }
  .fw input:focus {
    border-color: #2563eb;
    background: rgba(219,234,254,0.97);
    z-index: 20;
    position: relative;
  }
  .fw.correct input {
    background: rgba(187,247,208,0.95) !important;
    border-color: #16a34a !important;
    color: #14532d !important;
  }
  .fw.wrong input {
    background: rgba(254,202,202,0.95) !important;
    border-color: #dc2626 !important;
    color: #7f1d1d !important;
  }
  .fw.revealed input {
    background: rgba(254,243,199,0.95) !important;
    border-color: #d97706 !important;
    color: #78350f !important;
    font-style: italic;
  }

    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: #e2e8f0;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 0.8rem;
    letter-spacing: 1px;
    border: 1px solid #334155;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    z-index: 100;
  }

function norm(s) {
  return s.trim()
    .replace(/[''`]/g, "'")
    .replace(/\s+/g, ' ')
    .toUpperCase();
}

// Accept reasonable alternate formats
const ALTS = {
  "8500'-9500'":     "8,500' - 9,500'",
  "8500' - 9500'":   "8,500' - 9,500'",
  "8500-9500":       "8,500' - 9,500'",
  "8,500-9,500":     "8,500' - 9,500'",
  "10500'-11500'":   "10,500' - 11,500'",
  "10500' - 11500'": "10,500' - 11,500'",
  "10500-11500":     "10,500' - 11,500'",
  "10,500-11,500":   "10,500' - 11,500'",
  "9000":   "9,000'",  "9000'": "9,000'",  "9,000": "9,000'",
  "9500":   "9,500'",  "9500'": "9,500'",  "9,500": "9,500'",
  "8500":   "8,500'",  "8500'": "8,500'",  "8,500": "8,500'",
  "14DME":  "14 DME",  "18DME": "18 DME",  "22DME": "22 DME",
  "11DME":  "11 DME",  "12DME": "12 DME",  "16DME": "16 DME",
  "20DME":  "20 DME",  "24DME": "24 DME",
};

function isCorrect(raw, answer) {
  const u = norm(raw);
  const a = norm(answer);
  if (u === a) return true;
  return norm(ALTS[u] || '') === a;
}

function buildFields() {
  const container = document.getElementById('chart-container');
  container.querySelectorAll('.fw').forEach(e => e.remove());
  state = [];

  FIELDS.forEach((f, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'fw';
    // Apply: position at center, then rotate
    wrap.style.cssText =
      `left:${f.l}%; top:${f.t}%;` +
      `width:${f.w}%; height:${f.h}%;` +
      `transform:translate(-50%,-50%) rotate(${f.r}deg);`;

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.autocomplete = 'off';
    inp.autocorrect = 'off';
    inp.autocapitalize = 'off';
    inp.spellcheck = false;
    inp.title = f.tip;

    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); checkOne(idx); }
    });
    inp.addEventListener('blur', () => {
      if (inp.value.trim() && !state[idx].correct) checkOne(idx);
    });

    wrap.appendChild(inp);
    container.appendChild(wrap);
    state.push({ wrap, inp, correct: false });
  });
  updateScore();
}

function checkOne(idx) {
  const s = state[idx];
  if (s.correct) return;
  const wasWrong = s.wrap.classList.contains('wrong');

  if (isCorrect(s.inp.value, FIELDS[idx].a)) {
    s.correct = true;
    s.wrap.classList.remove('wrong', 'revealed');
    s.wrap.classList.add('correct');
    s.inp.disabled = true;
  } else {
    if (!wasWrong) { /* first wrong attempt */ }
    s.wrap.classList.remove('correct', 'revealed');
    s.wrap.classList.add('wrong');
    showHint('✗  ' + FIELDS[idx].tip + ' — try again');
  }
  updateScore();
}

function checkAll() {
  state.forEach((s, idx) => {
    if (!s.correct && s.inp.value.trim()) checkOne(idx);
  });
}

function revealAll() {
  state.forEach((s, idx) => {
    if (!s.correct) {
      s.inp.value = FIELDS[idx].a;
      s.inp.disabled = true;
      s.wrap.classList.remove('wrong', 'correct');
      s.wrap.classList.add('revealed');
    }
  });
}

function resetAll() {
  state.forEach(s => {
    s.inp.value = '';
    s.inp.disabled = false;
    s.correct = false;
    s.wrap.classList.remove('correct', 'wrong', 'revealed');
  });
  updateScore();
}

function updateScore() {
  const c = state.filter(s => s.correct).length;
  const w = state.filter(s => !s.correct && s.wrap.classList.contains('wrong')).length;
  document.getElementById('sc').textContent = c;
  document.getElementById('sw').textContent = w;
  document.getElementById('sl').textContent = TOTAL - c;
}

let hintTimer;
function showHint(msg) {
  const box = document.getElementById('hint-box');
  box.textContent = msg;
  box.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => box.classList.remove('show'), 2500);
}

const img = document.getElementById('chart-img');
if (img.complete && img.naturalWidth) buildFields();
else img.addEventListener('load', buildFields);
</script>
</body>
</html>
