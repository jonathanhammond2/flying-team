<style>

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }

  #toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  #score-display {
    color: #ccc;
    font-size: 0.85rem;
    letter-spacing: 1px;
    padding: 6px 14px;
    background: #222;
    border-radius: 6px;
    border: 1px solid #444;
  }

  #score-display span { font-weight: bold; }
  .sc { color: #4ade80; }
  .sw { color: #f87171; }
  .sr { color: #facc15; }

  button {
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    letter-spacing: 1px;
    padding: 6px 16px;
    border-radius: 5px;
    border: 1px solid #555;
    cursor: pointer;
    background: #2a2a2a;
    color: #ccc;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  button:hover { background: #3a3a3a; border-color: #888; color: #fff; }
  #btn-reveal { border-color: #f59e0b; color: #f59e0b; }
  #btn-reveal:hover { background: #2a2000; }
  #btn-reset { border-color: #f87171; color: #f87171; }
  #btn-reset:hover { background: #2a0000; }
  #btn-check { border-color: #4ade80; color: #4ade80; }
  #btn-check:hover { background: #002a10; }

  #chart-container {
    position: relative;
    display: inline-block;
    max-width: 100%;
    /* chart renders at natural size up to 850px wide */
    width: min(850px, 100%);
  }

  #chart-img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    pointer-events: none;
  }

  .field-wrap {
    position: absolute;
    transform: translate(-50%, -50%);
  }

  .field-wrap input {
    display: block;
    width: 100%;
    height: 100%;
    border: 1.5px solid rgba(255,255,255,0.7);
    border-radius: 2px;
    background: rgba(255,255,255,0.88);
    color: #000;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: clamp(7px, 1.1vw, 13px);
    text-align: center;
    padding: 0 2px;
    outline: none;
    transition: background 0.2s, border-color 0.2s;
    caret-color: #333;
  }

  .field-wrap input:focus {
    border-color: #2563eb;
    background: rgba(219,234,254,0.95);
    z-index: 10;
  }

  .field-wrap.correct input {
    background: rgba(187,247,208,0.95);
    border-color: #16a34a;
    color: #166534;
  }

  .field-wrap.wrong input {
    background: rgba(254,202,202,0.95);
    border-color: #dc2626;
    color: #7f1d1d;
  }

  .field-wrap.revealed input {
    background: rgba(254,243,199,0.95);
    border-color: #d97706;
    color: #78350f;
    font-style: italic;
  }

  #hint-box {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: #e2e8f0;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 0.8rem;
    letter-spacing: 1px;
    border: 1px solid #334155;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    z-index: 100;
  }
  #hint-box.show { opacity: 1; }
</style>

const TOTAL = FIELDS.length;
let inputs = [];
let correct = 0, wrong = 0;

function norm(s) {
  return s.trim().replace(/['']/g,"'").replace(/\s+/g,' ').toUpperCase();
}

function buildFields() {
  const container = document.getElementById('chart-container');
  // Remove old wraps
  container.querySelectorAll('.field-wrap').forEach(e => e.remove());
  inputs = [];

  FIELDS.forEach((f, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'field-wrap';
    wrap.style.left = f.l + '%';
    wrap.style.top = f.t + '%';
    wrap.style.width = f.w + '%';
    wrap.style.height = f.h + '%';

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.autocomplete = 'off';
    inp.autocorrect = 'off';
    inp.spellcheck = false;
    inp.dataset.idx = idx;
    inp.title = f.tip;

    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { checkOne(idx); e.preventDefault(); }
      if (e.key === 'Tab') { /* natural tab */ }
    });
    inp.addEventListener('blur', () => { if (inp.value) checkOne(idx); });

    wrap.appendChild(inp);
    container.appendChild(wrap);
    inputs.push({ wrap, inp, checked: false, wasCorrect: false });
  });
  updateScore();
}

function checkOne(idx) {
  const { wrap, inp, checked, wasCorrect } = inputs[idx];
  if (wasCorrect) return;
  const userVal = norm(inp.value);
  const correctVal = norm(FIELDS[idx].a);

  const wasWrong = wrap.classList.contains('wrong');

  if (userVal === correctVal) {
    if (!inputs[idx].wasCorrect) {
      correct++;
      if (wasWrong) wrong--;
      inputs[idx].wasCorrect = true;
    }
    wrap.classList.remove('wrong', 'revealed');
    wrap.classList.add('correct');
    inp.disabled = true;
  } else {
    if (!wasWrong && !inputs[idx].wasCorrect) wrong++;
    wrap.classList.add('wrong');
    showHint('✗ ' + FIELDS[idx].tip + ' — try again');
  }
  updateScore();
}

function checkAll() {
  inputs.forEach((_, idx) => {
    if (!inputs[idx].wasCorrect && inputs[idx].inp.value) checkOne(idx);
  });
}

function revealAll() {
  inputs.forEach((item, idx) => {
    if (!item.wasCorrect) {
      item.inp.value = FIELDS[idx].a;
      item.inp.disabled = true;
      item.wrap.classList.remove('wrong', 'correct');
      item.wrap.classList.add('revealed');
    }
  });
}

function resetAll() {
  correct = 0; wrong = 0;
  inputs.forEach(item => {
    item.inp.value = '';
    item.inp.disabled = false;
    item.wrap.classList.remove('correct', 'wrong', 'revealed');
    item.wasCorrect = false;
  });
  updateScore();
}

function updateScore() {
  document.getElementById('sc').textContent = correct;
  document.getElementById('sw').textContent = wrong;
  const left = TOTAL - inputs.filter(i => i.wasCorrect).length;
  document.getElementById('sl').textContent = left;
}

let hintTimer;
function showHint(msg) {
  const box = document.getElementById('hint-box');
  box.textContent = msg;
  box.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => box.classList.remove('show'), 2500);
}

// Build fields once image loaded (so % positioning is accurate)
const img = document.getElementById('chart-img');
if (img.complete) buildFields();
else img.addEventListener('load', buildFields);
</script>
